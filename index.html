<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <title>中世纪雇佣兵 - 放置游戏</title>
    <link rel="stylesheet" href="style.css?v=202603202318">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1B2A3A;color:#A0B2C0;min-height:100vh;padding:0;font-size:14px;overflow-x:hidden}
        .loading{display:flex;justify-content:center;align-items:center;height:100vh;background:#1B2A3A;color:#A0B2C0;font-size:1.2rem}
    </style>
</head>
<body>
    <div id="loading" class="loading">加载中...</div>
    <!-- 顶部固定区域 -->
    <header class="top-fixed">
        <div class="top-fixed-content">
            <span class="update-time-badge">代码更新: 2026-03-20 23:18</span>
            <span class="player-badge">
                <span>LV.<span id="top-level">1</span></span>
            </span>
        </div>
        <!-- 行动状态栏 -->
        <div class="action-status-bar" id="action-status-bar">
            <div class="action-status-content">
                <div class="action-status-left">
                    <span class="action-status-icon" id="action-status-icon">∞</span>
                    <span class="action-status-name" id="action-status-name">休息中</span>
                </div>
                <div class="action-progress-wrapper">
                    <div class="action-progress-bg">
                        <div class="action-progress-fill" id="action-progress-fill"></div>
                        <span class="action-progress-time" id="action-progress-time">-</span>
                    </div>
                    <button class="action-cancel-btn" id="action-cancel-btn">停止</button>
                </div>
                <div class="action-rewards" id="action-rewards"></div>
            </div>
        </div>
    </header>

    <!-- 侧边栏 -->
    <nav class="sidebar" id="sidebar">
        <!-- 图标栏 -->
        <div class="sidebar-icon-bar">
            <button class="icon-btn toggle-btn" id="sidebar-toggle" title="展开/收起">☰</button>
            <div class="icon-separator"></div>
            
            <!-- 主页 -->
            <div class="nav-item active" data-page="home">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">主页</span>
            </div>
            
            <!-- 仓库 -->
            <div class="nav-item" data-page="storage">
                <span class="nav-icon">📦</span>
                <span class="nav-text">仓库</span>
            </div>
            
            <!-- 伐木 -->
            <div class="nav-item nav-item-skill" data-page="woodcutting">
                <span class="nav-icon">🪓</span>
                <div class="nav-skill-wrapper">
                    <div class="nav-text-row">
                        <span class="nav-text">伐木</span>
                        <span class="nav-exp-level" id="nav-woodcutting-lvl">1</span>
                    </div>
                    <div class="nav-exp-bar">
                        <div class="nav-exp-bg">
                            <div class="nav-exp-fill" id="nav-woodcutting-exp"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 挖矿 -->
            <div class="nav-item nav-item-skill" data-page="mining">
                <span class="nav-icon">⛏️</span>
                <div class="nav-skill-wrapper">
                    <div class="nav-text-row">
                        <span class="nav-text">挖矿</span>
                        <span class="nav-exp-level" id="nav-mining-lvl">1</span>
                    </div>
                    <div class="nav-exp-bar">
                        <div class="nav-exp-bg">
                            <div class="nav-exp-fill" id="nav-mining-exp"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 采集 -->
            <div class="nav-item nav-item-skill" data-page="gathering">
                <span class="nav-icon">🌾</span>
                <div class="nav-skill-wrapper">
                    <div class="nav-text-row">
                        <span class="nav-text">采集</span>
                        <span class="nav-exp-level" id="nav-gathering-lvl">1</span>
                    </div>
                    <div class="nav-exp-bar">
                        <div class="nav-exp-bg">
                            <div class="nav-exp-fill" id="nav-gathering-exp"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 商人 -->
            <div class="nav-item" data-page="merchant">
                <span class="nav-icon">🏪</span>
                <span class="nav-text">商人</span>
            </div>
            
        </div>
    </nav>

    <div class="game-container">
        <!-- 主页 -->
        <main class="page active" id="page-home">
            <!-- 建筑区 -->
            <section class="panel">
                <h2 class="panel-title">🏰 我的地盘</h2>
                <div class="buildings-grid" id="buildings-list"></div>
            </section>
        </main>

        <!-- 仓库页 -->
        <main class="page" id="page-storage">
            <section class="panel">
                <h2 class="panel-title">📦 仓库</h2>
                <!-- 基础资源 -->
                <h3 class="storage-section-title">基础资源</h3>
                <div class="storage-grid">
                    <div class="storage-item">
                        <span class="storage-icon">💰</span>
                        <div class="storage-info">
                            <span class="storage-name">金币</span>
                            <span class="storage-value" id="storage-gold">0</span>
                        </div>
                    </div>
                    <div class="storage-item">
                        <span class="storage-icon">🪵</span>
                        <div class="storage-info">
                            <span class="storage-name">木材</span>
                            <span class="storage-value" id="storage-wood">0</span>
                        </div>
                    </div>
                    <div class="storage-item">
                        <span class="storage-icon">🪨</span>
                        <div class="storage-info">
                            <span class="storage-name">石头</span>
                            <span class="storage-value" id="storage-stone">0</span>
                        </div>
                    </div>
                    <div class="storage-item">
                        <span class="storage-icon">🌿</span>
                        <div class="storage-info">
                            <span class="storage-name">草药</span>
                            <span class="storage-value" id="storage-herb">0</span>
                        </div>
                    </div>
                </div>
                
                <!-- 伐木物品 -->
                <h3 class="storage-section-title">伐木物品</h3>
                <div class="storage-items-grid" id="storage-woodcutting-items"></div>
                
                <!-- 挖矿物品 -->
                <h3 class="storage-section-title">挖矿物品</h3>
                <div class="storage-items-grid" id="storage-mining-items"></div>
                
                <!-- 采集物品 -->
                <h3 class="storage-section-title">采集物品</h3>
                <div class="storage-items-grid" id="storage-gathering-items"></div>
            </section>
        </main>

        <!-- 伐木页 -->
        <main class="page" id="page-woodcutting">
            <section class="panel">
                <h2 class="panel-title">🪓 伐木场</h2>
                <div class="skill-exp-bar">
                    <div class="skill-exp-bg">
                        <div class="skill-exp-fill" id="woodcutting-exp-fill"></div>
                    </div>
                    <span class="skill-exp-level" id="woodcutting-level">1</span>
                </div>
                <div class="woodcutting-list" id="woodcutting-list"></div>
            </section>
        </main>

        <!-- 挖矿页 -->
        <main class="page" id="page-mining">
            <section class="panel">
                <h2 class="panel-title">⛏️ 矿洞</h2>
                <div class="skill-exp-bar">
                    <div class="skill-exp-bg">
                        <div class="skill-exp-fill" id="mining-exp-fill"></div>
                    </div>
                    <span class="skill-exp-level" id="mining-level">1</span>
                </div>
                <div class="mining-list" id="mining-list"></div>
            </section>
        </main>

        <!-- 采集页 -->
        <main class="page" id="page-gathering">
            <section class="panel">
                <h2 class="panel-title">🌾 采集</h2>
                <div class="skill-exp-bar">
                    <div class="skill-exp-bg">
                        <div class="skill-exp-fill" id="gathering-exp-fill"></div>
                    </div>
                    <span class="skill-exp-level" id="gathering-level">1</span>
                </div>
                <!-- 采集地点标签页 -->
                <div class="gathering-tabs" id="gathering-tabs"></div>
                <!-- 采集物列表 -->
                <div class="gathering-items-list" id="gathering-items-list"></div>
            </section>
        </main>

        <!-- 商人页 -->
        <main class="page" id="page-merchant">
            <section class="panel">
                <h2 class="panel-title">🏪 商人</h2>
                <div class="merchant-grid" id="merchant-list"></div>
            </section>
        </main>

        <!-- 底部 -->
        <footer class="footer">
            <span>💾 自动保存</span>
            <span id="play-time">00:00:00</span>
            <button class="reset-btn" id="reset-btn">重置</button>
        </footer>
    </div>

    <!-- 商人交易弹窗 -->
    <div class="merchant-modal" id="merchant-modal">
        <div class="merchant-modal-overlay" id="merchant-modal-overlay"></div>
        <div class="merchant-modal-panel">
            <div class="merchant-modal-header">
                <div class="merchant-modal-title">
                    <span class="merchant-modal-avatar" id="merchant-modal-avatar">🏪</span>
                    <div class="merchant-modal-info">
                        <h3 id="merchant-modal-name">商人名称</h3>
                        <div class="merchant-favorability">
                            <span class="favorability-icon">❤️</span>
                            <span class="favorability-value" id="merchant-modal-favorability">0.00</span>
                        </div>
                    </div>
                </div>
                <button class="merchant-modal-close" id="merchant-modal-close">&times;</button>
            </div>
            
            <!-- 二级菜单 -->
            <div class="merchant-tabs">
                <button class="merchant-tab active" data-tab="trade">交易</button>
                <button class="merchant-tab" data-tab="quest">任务</button>
            </div>
            
            <!-- 内容区域（交易/任务） -->
            <div class="merchant-content">
                <!-- 交易栏 -->
                <div class="merchant-tab-content active" id="merchant-tab-trade">
                    <div class="merchant-goods-list" id="merchant-goods-list"></div>
                </div>
                
                <!-- 任务栏 -->
                <div class="merchant-tab-content" id="merchant-tab-quest">
                    <div class="merchant-quest-list" id="merchant-quest-list"></div>
                </div>
            </div>
            
            <!-- 我的仓库 -->
            <div class="merchant-warehouse">
                <div class="merchant-warehouse-header">
                    <h4>我的仓库</h4>
                    <button class="merchant-select-btn" id="merchant-select-btn">选择</button>
                </div>
                <div class="merchant-warehouse-grid" id="merchant-warehouse-grid"></div>
                <div class="merchant-sell-bar" id="merchant-sell-bar" style="display: none;">
                    <span class="merchant-sell-total">总计：<span id="merchant-sell-total">0</span> 金币</span>
                    <button class="merchant-sell-btn" id="merchant-sell-btn">出售</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 模态框 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>
    
    <!-- 行动次数选择弹窗 -->
    <div class="modal" id="action-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="action-modal-title">选择行动次数</h2>
                <span class="modal-close" id="action-modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="action-count-options">
                    <button class="count-option" data-count="1">1 次</button>
                    <button class="count-option" data-count="10">10 次</button>
                    <button class="count-option" data-count="100">100 次</button>
                    <button class="count-option" data-count="1000">1000 次</button>
                    <button class="count-option" data-count="99999">∞</button>
                </div>
                <div class="action-count-custom">
                    <label>自定义次数：</label>
                    <input type="number" id="action-count-input" min="1" max="99999" placeholder="输入次数">
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" id="action-modal-cancel">取消</button>
                <button class="modal-btn primary" id="action-modal-confirm">确认</button>
            </div>
        </div>
    </div>
    
    <!-- 替换行动确认弹窗 -->
    <div class="modal" id="replace-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>替换当前行动？</h2>
                <span class="modal-close" id="replace-modal-close">&times;</span>
            </div>
            <div class="modal-body">
                <p>当前已有行动正在进行，是否要替换为新的行动？</p>
                <p style="color: #8B2C2D; margin-top: 10px;">⚠️ 当前行动将被取消，不会获得奖励</p>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" id="replace-modal-cancel">取消</button>
                <button class="modal-btn primary" id="replace-modal-confirm">替换</button>
            </div>
        </div>
    </div>

    <script src="game.js?v=202603202318"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中世纪雇佣兵 - 放置游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- 顶部状态栏 -->
        <header class="status-bar">
            <div class="player-info">
                <span class="player-icon">⚔️</span>
                <span class="player-level">LV.<span id="level">1</span></span>
                <span class="player-name">雇佣兵</span>
            </div>
            <div class="resources-mini">
                <span class="res gold">💰 <span id="gold">0</span></span>
                <span class="res wood">🪵 <span id="wood">0</span></span>
                <span class="res stone">🪨 <span id="stone">0</span></span>
                <span class="res herb">🌿 <span id="herb">0</span></span>
            </div>
        </header>

        <!-- 战斗状态 -->
        <section class="combat-section">
            <div class="combat-status">
                <div class="combat-icon">⚔️</div>
                <div class="combat-info">
                    <div class="combat-location" id="combat-location">未出征</div>
                    <div class="combat-timer" id="combat-timer">-</div>
                </div>
                <button class="combat-btn" id="combat-btn">出征</button>
            </div>
            <div class="combat-rewards" id="combat-rewards"></div>
        </section>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 左侧：地盘建筑 -->
            <section class="buildings-panel">
                <h2 class="panel-title">🏰 我的地盘</h2>
                <div class="buildings-grid" id="buildings-list"></div>
            </section>

            <!-- 右侧：行动区 -->
            <section class="actions-panel">
                <h2 class="panel-title">⚒️ 行动</h2>
                
                <!-- 采集行动 -->
                <div class="action-group">
                    <h3 class="action-group-title">🌲 采集资源</h3>
                    <div class="actions-list" id="gather-actions"></div>
                </div>

                <!-- 制作行动 -->
                <div class="action-group">
                    <h3 class="action-group-title">🔨 制作</h3>
                    <div class="actions-list" id="craft-actions"></div>
                </div>
            </section>
        </main>

        <!-- 底部：NPC -->
        <section class="npc-section">
            <h2 class="panel-title">🏘️ 城镇</h2>
            <div class="npc-list">
                <button class="npc-btn" data-npc="merchant">🏪 商人</button>
                <button class="npc-btn" data-npc="quest">📜 任务官</button>
                <button class="npc-btn" data-npc="smith">🔧 工匠</button>
            </div>
        </section>

        <!-- 底部状态 -->
        <footer class="footer">
            <span>💾 自动保存</span>
            <span id="play-time">00:00:00</span>
            <button class="reset-btn" id="reset-btn">重置</button>
        </footer>
    </div>

    <!-- 模态框 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>

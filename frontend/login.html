<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中世纪雇佣兵 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e0e0;
        }
        
        .login-container {
            background: rgba(30, 39, 46, 0.95);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(232, 197, 127, 0.2);
        }
        
        .game-title {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .game-title h1 {
            color: #E8C57F;
            font-size: 28px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .game-title p {
            color: #888;
            font-size: 14px;
        }
        
        .tab-buttons {
            display: flex;
            margin-bottom: 30px;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #888;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #E8C57F 0%, #d4a84b 100%);
            color: #1a1a2e;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #E8C57F;
            font-size: 14px;
        }
        
        .form-group input[type="text"],
        .form-group input[type="password"],
        .form-group input[type="email"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(232, 197, 127, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #E8C57F;
        }
        
        .form-group input::placeholder {
            color: #666;
        }
        
        .form-hint {
            display: block;
            margin-top: 6px;
            font-size: 12px;
            color: #888;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #E8C57F;
        }
        
        .checkbox-group label {
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #E8C57F 0%, #d4a84b 100%);
            color: #1a1a2e;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(232, 197, 127, 0.4);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .message.error {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid rgba(220, 53, 69, 0.5);
            color: #ff6b6b;
        }
        
        .message.success {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid rgba(40, 167, 69, 0.5);
            color: #69db7c;
        }
        
        .form-panel {
            display: none;
        }
        
        .form-panel.active {
            display: block;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 26, 46, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            display: none;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(232, 197, 127, 0.3);
            border-top-color: #E8C57F;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
    </div>
    
    <div class="login-container">
        <div class="game-title">
            <h1>⚔️ 中世纪雇佣兵</h1>
            <p>Medieval Mercenary</p>
        </div>
        
        <div class="tab-buttons">
            <button class="tab-btn active" data-tab="login">登录</button>
            <button class="tab-btn" data-tab="register">注册</button>
        </div>
        
        <div class="message" id="message"></div>
        
        <!-- 登录表单 -->
        <div class="form-panel active" id="login-panel">
            <form id="login-form">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码" required>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="auto-login">
                    <label for="auto-login">自动登录（下次免登录）</label>
                </div>
                <button type="submit" class="submit-btn">进入游戏</button>
            </form>
        </div>
        
        <!-- 注册表单 -->
        <div class="form-panel" id="register-panel">
            <form id="register-form">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="reg-username" placeholder="4-16位字母或数字" required>
                    <small class="form-hint">用于登录，注册后不可修改</small>
                </div>
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="reg-email" placeholder="example@email.com" required>
                    <small class="form-hint">用于找回密码</small>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="reg-password" placeholder="至少6位密码" required>
                    <small class="form-hint">建议包含字母、数字和符号</small>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="reg-password2" placeholder="再次输入密码" required>
                </div>
                <button type="submit" class="submit-btn">注册账号</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const TOKEN_KEY = 'medieval_token';
        const AUTO_LOGIN_KEY = 'medieval_auto_login';
        
        // 检查自动登录
        async function checkAutoLogin() {
            const token = localStorage.getItem(TOKEN_KEY);
            const autoLogin = localStorage.getItem(AUTO_LOGIN_KEY);
            
            if (token && autoLogin === 'true') {
                // 验证 token 是否有效
                try {
                    const res = await fetch(`${API_URL}/api/auth/verify`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        // Token 有效，直接进入游戏
                        window.location.href = '/game.html';
                    }
                } catch (e) {
                    // Token 无效，清除
                    localStorage.removeItem(TOKEN_KEY);
                }
            }
        }
        
        checkAutoLogin();
        
        // 切换标签
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`${btn.dataset.tab}-panel`).classList.add('active');
                hideMessage();
            });
        });
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
        }
        
        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }
        
        function showLoading() {
            document.getElementById('loading').style.display = 'flex';
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
        
        // 注册
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();
            
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const password2 = document.getElementById('reg-password2').value;
            
            // 验证
            if (!/^[a-zA-Z0-9]{4,16}$/.test(username)) {
                showMessage('用户名需要4-16位字母或数字', 'error');
                return;
            }
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showMessage('请输入有效的邮箱地址', 'error');
                return;
            }
            if (password.length < 6) {
                showMessage('密码至少6位', 'error');
                return;
            }
            if (password !== password2) {
                showMessage('两次密码不一致', 'error');
                return;
            }
            
            showLoading();
            
            try {
                const res = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showMessage('注册成功！请登录', 'success');
                    // 切换到登录
                    document.querySelector('[data-tab="login"]').click();
                    document.getElementById('login-username').value = username;
                } else {
                    showMessage(data.error || '注册失败', 'error');
                }
            } catch (e) {
                showMessage('网络错误，请重试', 'error');
            }
            
            hideLoading();
        });
        
        // 登录
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();
            
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const autoLogin = document.getElementById('auto-login').checked;
            
            if (!username || !password) {
                showMessage('请填写用户名和密码', 'error');
                return;
            }
            
            showLoading();
            
            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    // 保存 token
                    localStorage.setItem(TOKEN_KEY, data.token);
                    localStorage.setItem(AUTO_LOGIN_KEY, autoLogin ? 'true' : 'false');
                    
                    showMessage('登录成功！正在进入游戏...', 'success');
                    
                    // 跳转到游戏页面
                    setTimeout(() => {
                        window.location.href = '/game.html';
                    }, 500);
                } else {
                    showMessage(data.error || '登录失败', 'error');
                }
            } catch (e) {
                showMessage('网络错误，请重试', 'error');
            }
            
            hideLoading();
        });
    </script>
</body>
</html>
